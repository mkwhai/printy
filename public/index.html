<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printy - Dedykowana Usługa Drukowania</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Printy</h1>
            <p>Zarządzaj swoimi wydrukami z łatwością</p>
        </header>

        <main>
            <!-- Zintegrowane Miejsce Akcji (Dropzone + URL) -->
            <section class="card upload-card hero-dropzone" id="dropzone">
                <div class="upload-content">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                    <h2>Przeciągnij i upuść plik</h2>
                    <p class="mb-2">aby wybrać z dysku kliknij w to pole</p>
                    <input type="file" id="fileInput" class="hidden">
                    
                    <div class="divider">
                        <span>LUB WPISZ LINK</span>
                    </div>

                    <div class="url-input-group" id="urlGroup">
                        <input type="url" id="urlInput" placeholder="https://example.com/document.pdf">
                        <button class="btn btn-primary" id="urlNextBtn">Dalej</button>
                    </div>
                </div>
            </section>
            
            <div id="statusMessage" class="status-message hidden"></div>

            <!-- Zarządzanie Drukarkami -->
            <section class="card settings-card mt-2 hidden" id="adminPanel">
                <div class="accordion">
                    <button class="accordion-btn" id="togglePrinterSetup">Zarządzaj serwerem CUPS (Panel Admina)</button>
                    <div class="accordion-content" id="printerSetupBlock">
                        <p class="help-text">Ta sekcja pozwala dodać nową drukarkę sieciową (JetDirect na porcie 9100) prosto do serwera Printy.</p>
                        <div class="form-group grid-2">
                            <div>
                                <label for="setupPrinterName">Nazwa drukarki</label>
                                <input type="text" id="setupPrinterName" placeholder="np. Brother_HL">
                            </div>
                            <div>
                                <label for="setupPrinterIP">Adres IP (lokalny)</label>
                                <input type="text" id="setupPrinterIP" placeholder="np. 192.168.1.100">
                            </div>
                        </div>
                        <button class="btn btn-secondary" id="setupPrinterBtn">Dodaj drukarkę do serwera</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Zaawansowanych Ustawień Druku -->
    <div id="printModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Ustawienia Wydruku</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-content">
                <p id="modalFileName" class="modal-file-name"></p>
                
                <div class="form-group">
                    <label for="printerName">Odbiorca (Kolejka drukarki)</label>
                    <input type="text" id="printerName" placeholder="Pozostaw puste dla domyślnej w systemie">
                </div>

                <div class="form-group grid-2">
                    <div>
                        <label for="copies">Liczba kopii</label>
                        <input type="number" id="copies" value="1" min="1" max="100">
                    </div>
                    <div>
                        <label for="scale">Skala (%)</label>
                        <input type="number" id="scale" placeholder="np. 100" min="1" max="200">
                    </div>
                </div>

                <div class="form-group">
                    <label for="pageRanges">Zakres stron</label>
                    <input type="text" id="pageRanges" placeholder="np. 1, 3-5, 8">
                </div>

                <div class="form-group checkbox-grid pt-1">
                    <label class="checkbox-label">
                        <input type="checkbox" id="duplex">
                        Druk dwustronny
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="color" checked>
                        Druk w kolorze
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="fitToPage">
                        Dopasuj do strony
                    </label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelPrintBtn">Anuluj</button>
                <button class="btn btn-primary" id="confirmPrintBtn">Drukuj</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
